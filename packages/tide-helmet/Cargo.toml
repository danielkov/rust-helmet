[package]
name = "tide-helmet"
version = "1.0.0"
edition = "2021"
authors = ["Daniel Kovacs <kovacsemod@gmail.com>"]
description = "HTTP security headers middleware for Tide web framework"
readme = "README.md"
license = "MIT"
homepage = "https://github.com/danielkov/rust-helmet"
repository = "https://github.com/danielkov/rust-helmet"
keywords = ["helmet", "security", "middleware", "rust", "tide"]
categories = [
  "web-programming",
  "network-programming",
  "web-programming::http-server",
]

[dependencies]
helmet-core = { path = "../helmet-core", version = "1.0.0" }
tide = "0.16"
async-trait = "0.1"

[dev-dependencies]
async-std = { version = "1", features = ["attributes"] }
