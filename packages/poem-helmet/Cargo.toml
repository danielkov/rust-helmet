[package]
name = "poem-helmet"
version = "0.3.0"
edition = "2021"
authors = ["Daniel Kovacs <kovacsemod@gmail.com>"]
description = "HTTP security headers middleware for Poem web framework"
readme = "README.md"
license = "MIT"
homepage = "https://github.com/danielkov/rust-helmet"
repository = "https://github.com/danielkov/rust-helmet"
keywords = ["helmet", "security", "middleware", "rust", "poem"]
categories = [
  "web-programming",
  "network-programming",
  "web-programming::http-server",
]

[dependencies]
helmet-core = { path = "../helmet-core", version = "0.3.0" }
poem = "3"
http = "1.4"

[dev-dependencies]
poem = { version = "3", features = ["test"] }
tokio = { version = "1.50", features = ["rt-multi-thread", "macros"] }
