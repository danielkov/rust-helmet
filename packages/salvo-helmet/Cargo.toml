[package]
name = "salvo-helmet"
version = "0.3.0"
edition = "2021"
authors = ["Daniel Kovacs <kovacsemod@gmail.com>"]
description = "HTTP security headers middleware for Salvo web framework"
readme = "README.md"
license = "MIT"
homepage = "https://github.com/danielkov/rust-helmet"
repository = "https://github.com/danielkov/rust-helmet"
keywords = ["helmet", "security", "middleware", "rust", "salvo"]
categories = [
  "web-programming",
  "network-programming",
  "web-programming::http-server",
]

[dependencies]
helmet-core = { path = "../helmet-core", version = "0.3.0" }
salvo = "0.89"
http = "1.4"

[dev-dependencies]
tokio = { version = "1.50", features = ["rt-multi-thread", "macros"] }
