[package]
name = "axum-helmet"
version = "1.0.1"
edition = "2021"
authors = ["Daniel Kovacs <kovacsemod@gmail.com>"]
description = "HTTP security headers middleware core for axum web framework"
readme = "README.md"
license = "MIT"
homepage = "https://github.com/danielkov/rust-helmet"
repository = "https://github.com/danielkov/rust-helmet"
keywords = ["helmet", "security", "middleware", "rust", "axum"]
categories = [
  "web-programming",
  "network-programming",
  "web-programming::http-server",
]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
helmet-core = { path = "../helmet-core", version = "1.0.0" }
tower = "0.5"
tower-service = "0.3"
http = "1.4"
pin-project-lite = "0.2"

[dev-dependencies]
axum = "0.8"
axum-test = "19"
tokio = { version = "1.50", features = ["macros", "rt-multi-thread"] }
