[package]
name = "rocket-helmet"
version = "0.3.0"
edition = "2021"
authors = ["Daniel Kovacs <kovacsemod@gmail.com>"]
description = "HTTP security headers middleware for Rocket web framework"
readme = "README.md"
license = "MIT"
homepage = "https://github.com/danielkov/rust-helmet"
repository = "https://github.com/danielkov/rust-helmet"
keywords = ["helmet", "security", "middleware", "rust", "rocket"]
categories = [
  "web-programming",
  "network-programming",
  "web-programming::http-server",
]

[dependencies]
helmet-core = { path = "../helmet-core", version = "0.3.0" }
rocket = "0.5"

[dev-dependencies]
rocket = { version = "0.5", features = ["json"] }
tokio = { version = "1.50", features = ["rt-multi-thread"] }
