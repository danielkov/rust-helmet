name: Test and Publish
on:
  push:
    branches:
      - master
jobs:
  clippy:
    name: Clippy
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy
          override: true
      - uses: actions-rs/clippy-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --all-features
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable-x86_64-unknown-linux-gnu
          profile: minimal
          override: true
      - uses: actions-rs/cargo@v1
        with:
          command: test
          args: --verbose
  publish:
    name: Publish
    needs:
      - test
      - clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          for pkg in helmet-core actix-web-helmet axum-helmet ntex-helmet poem-helmet rocket-helmet salvo-helmet tide-helmet warp-helmet; do
            echo "Publishing $pkg..."
            cargo publish -p "$pkg" || echo "Skipping $pkg (already published or error)"
            sleep 5
          done
